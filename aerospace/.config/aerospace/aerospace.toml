config-version = 2

after-login-command = []
after-startup-command = []

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = "move-mouse monitor-lazy-center"

automatically-unhide-macos-hidden-apps = false

persistent-workspaces = ["A", "B", "C", "D", "G", "I", "M", "N", "R", "S", "T", "V", "W", "X"]

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 14
    inner.vertical =  14
    outer.left = [{monitor.'Built-in Retina Display' = 15}, {monitor.'VA249QG' = 12}, 20]
    
    outer.bottom = [{monitor.'Built-in Retina Display' = 20}, {monitor.'VA249QG' = 12}, 20]
    outer.top = [{monitor.'Built-in Retina Display' = 4}, {monitor.'VA249QG' = 6}, 4]

    outer.right = [{monitor.'Built-in Retina Display' = 15}, {monitor.'VA249QG' = 12}, 20]    

[mode.main.binding]
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    alt-a = 'workspace A' # Any
    alt-b = 'workspace B' # Browser
    alt-c = 'workspace C' # Coding
    alt-d = 'workspace D' # Document / Finder
    alt-g = 'workspace G' # Game
    alt-i = 'workspace I' # Claude, Codex
    alt-m = 'workspace M' # Music
    alt-n = 'workspace N' # Note
    alt-r = 'workspace R' # Reading
    alt-s = 'workspace S' # Setting
    alt-t = 'workspace T' # Terminal
    alt-v = 'workspace V' # Video
    alt-w = 'workspace W' # Work: Discord
    alt-x = 'workspace X' # VM

    alt-shift-a = 'move-node-to-workspace A'
    alt-shift-b = 'move-node-to-workspace B'
    alt-shift-c = 'move-node-to-workspace C'
    alt-shift-d = 'move-node-to-workspace D'
    alt-shift-g = 'move-node-to-workspace G'
    alt-shift-i = 'move-node-to-workspace I'
    alt-shift-m = 'move-node-to-workspace M'
    alt-shift-n = 'move-node-to-workspace N'
    alt-shift-r = 'move-node-to-workspace R'
    alt-shift-s = 'move-node-to-workspace S'
    alt-shift-t = 'move-node-to-workspace T'
    alt-shift-v = 'move-node-to-workspace V'
    alt-shift-w = 'move-node-to-workspace W'
    alt-shift-x = 'move-node-to-workspace X'

    alt-tab = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    alt-shift-f = 'fullscreen'

    alt-shift-semicolon = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace C'

[[on-window-detected]]
if.app-id = 'dev.zed.Zed'
run = 'move-node-to-workspace C'

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace C'

[[on-window-detected]]
if.app-id = 'com.brave.Browser'
run = 'move-node-to-workspace B'

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = 'move-node-to-workspace B'

[[on-window-detected]]
if.app-id = 'com.electron.dockerdesktop'
run = 'move-node-to-workspace A'

[[on-window-detected]]
if.app-id = 'com.apple.Preview'
run = 'move-node-to-workspace R'

[[on-window-detected]]
if.app-id = 'com.apple.Notes'
run = 'move-node-to-workspace N'

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace N'

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = 'move-node-to-workspace W'

[[on-window-detected]]
if.app-id = 'com.openai.codex'
run = 'move-node-to-workspace I'

[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop'
run = 'move-node-to-workspace I'

[[on-window-detected]]
if.app-id = 'com.vng.zalo'
run = 'move-node-to-workspace W'

[[on-window-detected]]
if.app-id = 'com.vng.zalo.zalocall'
run = 'move-node-to-workspace W'

[[on-window-detected]]
if.app-id = 'jp.naver.line.mac'
run = 'move-node-to-workspace W'

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'move-node-to-workspace S'
